name: Release Kylin ARM64 Docker Tars

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag for the Kylin ARM64 tar files
        required: true
        default: kylin-arm64-tars-20260605
      kylin_base_image:
        description: Kylin/vendor ARM64 base image
        required: true
        default: macrosan/kylin:v10-sp3-2403

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - mode: mcp
            dockerfile: Dockerfile.kylin-mcp
            image: gpt-vis-mcp:kylin-arm64
            tar: gpt-vis-mcp-kylin-arm64.tar
          - mode: ssr
            dockerfile: Dockerfile.kylin-ssr
            image: gpt-vis-ssr:kylin-arm64
            tar: gpt-vis-ssr-kylin-arm64.tar

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build Kylin ARM64 image tar
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/arm64
          build-args: |
            KYLIN_BASE_IMAGE=${{ inputs.kylin_base_image }}
          tags: ${{ matrix.image }}
          outputs: type=docker,dest=${{ matrix.tar }}
          provenance: false
          sbom: false

      - name: Check tar
        run: |
          ls -lh "${{ matrix.tar }}"
          sha256sum "${{ matrix.tar }}" > "${{ matrix.tar }}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Kylin ARM64 Docker tars ${{ inputs.tag }}
          body: |
            Kylin/vendor-base ARM64 Docker image tar files.

            Base image:
            `${{ inputs.kylin_base_image }}`

            These images are built with GitHub hosted ARM64 runners using Docker Buildx `linux/arm64`.
            Native dependencies are installed inside the vendor base image, and Node/Deno native
            addons such as `canvas` are forced to compile from source to avoid generic 4K-page
            prebuilt binaries. Final verification on the target 64K-page Linux server is still required.
          files: |
            ${{ matrix.tar }}
            ${{ matrix.tar }}.sha256
          fail_on_unmatched_files: true
