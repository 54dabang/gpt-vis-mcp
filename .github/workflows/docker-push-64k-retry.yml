name: Docker Push 64K Retry

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: Tag suffix for retry images
        required: true
        default: 64k-retry

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - mode: mcp
            extra_tags: ""
          - mode: ssr
            extra_tags: ghcr.io/${{ github.repository }}:latest-http-${{ inputs.tag_suffix }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.mode }}
          push: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository }}:latest-${{ matrix.mode }}-${{ inputs.tag_suffix }}
            ${{ matrix.extra_tags }}
